# Prometheus configuration for Kanbrio observability
# Scrapes metrics from the Kanbrio API and the OTel Collector.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Kanbrio API metrics (Populated once issue e2l.3 is implemented)
  - job_name: "kanbrio-api"
    metrics_path: "/api/observability/metrics"
    static_configs:
      - targets: ["api:3000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # OTel Collector internal metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
