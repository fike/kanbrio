# Prometheus configuration for Kanbrio observability stack
# Mounted at /etc/prometheus/prometheus.yml in the prometheus container.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "kanbrio-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
