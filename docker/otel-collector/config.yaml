# OpenTelemetry Collector configuration for Kanbrio
# Receives OTLP spans from the API and exports to Jaeger.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

  # Internal metrics for Prometheus scraping
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8889"]

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 128
    spike_limit_mib: 32

exporters:
  # Export traces to Jaeger
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

  # Debug exporter for local development (logs traces to stdout)
  debug:
    verbosity: basic

  # Prometheus metrics exporter (exposes self-metrics)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otel"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
