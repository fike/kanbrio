version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanbrio-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=kanbrio
    volumes:
      - .docker/pgdata:/var/lib/postgresql/data
    networks:
      - kanbrio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: kanbrio-api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:password@postgres:5432/kanbrio
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanbrio-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: kanbrio-web
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - kanbrio-network

networks:
  kanbrio-network:
    driver: bridge
