repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/doublereed/pre-commit-rust
    rev: v1.0.0
    hooks:
      - id: fmt
        args: ["--manifest-path", "apps/api/Cargo.toml", "--"]
      - id: clippy
        args: ["--manifest-path", "apps/api/Cargo.toml", "--", "-D", "warnings"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: .beads/
