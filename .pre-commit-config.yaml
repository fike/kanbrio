repos:
  - repo: git@github.com:pre-commit/pre-commit-hooks.git
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: frontend-check
        name: Frontend Quality Gate
        entry: bash -c "cd apps/web && npx tsc --noEmit && npm run lint"
        language: system
        files: ^apps/web/
        pass_filenames: false

  - repo: git@github.com:doublify/pre-commit-rust.git
    rev: v1.0
    hooks:
      - id: fmt
        args: ["--manifest-path", "apps/api/Cargo.toml", "--"]
      - id: clippy
        args: ["--manifest-path", "apps/api/Cargo.toml", "--", "-D", "warnings"]

  - repo: git@github.com:Yelp/detect-secrets.git
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        exclude: .beads/
